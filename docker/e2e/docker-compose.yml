services:
  # ---------------- Mock matrix (no credentials) ----------------
  mock-e2e-claude:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "claude", "--use-mock-harness", "--mock-scenario", "claude-basic", "--prompt", "hello"]

  mock-e2e-codex:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "codex", "--use-mock-harness", "--mock-scenario", "codex-basic", "--prompt", "hello"]

  mock-e2e-cursor:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "cursor", "--use-mock-harness", "--mock-scenario", "cursor-basic", "--prompt", "hello"]

  mock-e2e-gemini:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "gemini", "--use-mock-harness", "--mock-scenario", "gemini-basic", "--prompt", "hello"]

  mock-e2e-opencode:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "opencode", "--use-mock-harness", "--mock-scenario", "opencode-basic", "--prompt", "hello"]

  mock-e2e-openclaw:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "openclaw", "--use-mock-harness", "--mock-scenario", "openclaw-basic", "--prompt", "hello"]

  mock-e2e-copilot:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "copilot", "--use-mock-harness", "--mock-scenario", "copilot-basic", "--prompt", "hello"]

  mock-e2e-hermes:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "hermes", "--use-mock-harness", "--mock-scenario", "hermes-basic", "--prompt", "hello"]

  mock-e2e-pi:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "pi", "--use-mock-harness", "--mock-scenario", "pi-basic", "--prompt", "hello"]

  mock-e2e-omp:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "omp", "--use-mock-harness", "--mock-scenario", "omp-basic", "--prompt", "hello"]

  mock-e2e-agent-mux-remote:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.mock
    environment:
      USE_MOCK_HARNESS: "true"
    command: ["run", "agent-mux-remote", "--use-mock-harness", "--mock-scenario", "agent-mux-remote-basic", "--prompt", "hello"]

  # ---------------- Real matrix (credentials required) ----------------
  real-e2e-claude:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.real
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["run", "claude", "--prompt", "say hi"]

  real-e2e-codex:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.real
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["run", "codex", "--prompt", "say hi"]

  real-e2e-cursor:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.real
    environment:
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
    command: ["run", "cursor", "--prompt", "say hi"]

  real-e2e-gemini:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.real
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    command: ["run", "gemini", "--prompt", "say hi"]

  real-e2e-opencode:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.real
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["run", "opencode", "--prompt", "say hi"]
