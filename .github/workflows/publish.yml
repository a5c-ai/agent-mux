name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, run npm publish --dry-run'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Verify built artifacts exist
        run: |
          set -euo pipefail
          missing=0
          for pkg in core adapters cli agent-mux harness-mock; do
            if [ ! -f "packages/$pkg/dist/index.js" ]; then
              echo "::error::packages/$pkg/dist/index.js missing after build"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Publish packages (with npm provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          FLAG=""
          if [ "${DRY_RUN:-false}" = "true" ]; then
            FLAG="--dry-run"
            echo "Running in dry-run mode"
          fi
          # Publish in dependency order. prepublishOnly rebuilds each package.
          for pkg in core adapters cli agent-mux harness-mock; do
            echo "::group::Publish @a5c-ai/agent-mux-$pkg (dir: packages/$pkg)"
            (cd "packages/$pkg" && npm publish --access public --provenance $FLAG)
            echo "::endgroup::"
          done
